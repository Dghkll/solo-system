<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Player Status</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>👤 PLAYER STATUS</h1>

<div class="quest">
<p>🏅 Rank : <span id="rank">E</span></p>
<p>⭐ XP : <span id="xp">0</span></p>
<p>🪙 Gold : <span id="gold">0</span></p>

<hr>

<p>💪 Strength : <span id="strength">5</span></p>
<p>⚡ Agility : <span id="agility">5</span></p>
<p>❤️ Endurance : <span id="endurance">5</span></p>
<p>🧠 Intelligence : <span id="intelligence">5</span></p>
<p>🎯 Focus : <span id="focus">5</span></p>
<p>🍀 Luck : <span id="luck">5</span></p>
</div>

<br>

<button onclick="location.href='dashboard.html'">
⬅ Dashboard
</button>

<script>

let xp = Number(localStorage.getItem("xp")) || 0;
let gold = Number(localStorage.getItem("gold")) || 0;

document.getElementById("xp").textContent = xp;
document.getElementById("gold").textContent = gold;

function loadStat(id, value){
    document.getElementById(id).textContent =
    localStorage.getItem(id) || value;
}

loadStat("strength",5);
loadStat("agility",5);
loadStat("endurance",5);
loadStat("intelligence",5);
loadStat("focus",5);
loadStat("luck",5);

let rank = "E";
if(xp>=1000) rank="D";
if(xp>=3000) rank="C";
if(xp>=6000) rank="B";
if(xp>=10000) rank="A";
if(xp>=20000) rank="S";

document.getElementById("rank").textContent = rank;

</script>

</body>
</html>
